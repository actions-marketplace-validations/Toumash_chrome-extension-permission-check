name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm test
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Test with safe update (should pass)
        uses: ./
        with:
          baseline-manifest: test/fixtures/baseline.json
          new-manifest: test/fixtures/safe-update.json

      - name: Test with dangerous update (should detect warnings)
        id: dangerous
        uses: ./
        continue-on-error: true
        with:
          baseline-manifest: test/fixtures/baseline.json
          new-manifest: test/fixtures/dangerous-update.json

      - name: Verify dangerous update was detected
        run: |
          if [ "${{ steps.dangerous.outcome }}" != "failure" ]; then
            echo "Expected dangerous update to fail but it passed"
            exit 1
          fi
          echo "Correctly detected dangerous permission update"
